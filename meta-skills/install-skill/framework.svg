<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1050" font-family="system-ui, -apple-system, &quot;PingFang SC&quot;, &quot;Helvetica Neue&quot;, Arial, sans-serif">
  <defs>
    <style>text{font-family:system-ui,-apple-system,"PingFang SC","Helvetica Neue",Arial,sans-serif;}</style>
    <marker id="arrow-gray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#ca8a04"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#dc2626"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1400" height="1050" fill="#ffffff"/>
  <text x="700" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">install-skill — 框架图</text>
  <text x="700" y="68" text-anchor="middle" font-size="13" fill="#64748b">v0.1.0 · cache → 强制问 scope → 冲突检测 → 复制 (own / external 分支) → dogfood</text>
  <rect x="80" y="92" width="1240" height="58" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="100" y="115" font-size="13" font-weight="600" fill="#475569">用户触发短语</text>
  <text x="100" y="136" font-size="12" fill="#334155">"装第 2 个到 user 级" · "把 my-cool-skill 装到当前 project" · "安装公司 skill X 到用户级"</text>
  <line x1="700" y1="150" x2="700" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <rect x="80" y="178" width="1240" height="78" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="1.3"/>
  <text x="100" y="202" font-size="14" font-weight="700" fill="#0f172a">§1 确认 skill 在缓存</text>
  <text x="100" y="223" font-size="12" fill="#334155">ls ~/.tranfu-labs/claude-skills/&lt;name&gt;/SKILL.md  →  读 frontmatter 拿 origin / source_url</text>
  <text x="100" y="243" font-size="11" fill="#64748b">不存在 → 提示 "缓存里没有 &lt;name&gt;, 要不要先 update-skills 拉最新?"</text>
  <line x1="700" y1="256" x2="700" y2="276" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <rect x="80" y="284" width="1240" height="78" rx="10" fill="#fef3c7" stroke="#ca8a04" stroke-width="1.6"/>
  <text x="100" y="308" font-size="14" font-weight="700" fill="#854d0e">§2 强制问 scope (硬约束 — 无论用户是否已说)</text>
  <text x="100" y="329" font-size="12" fill="#334155">① user 级 (~/.claude/skills/, 所有项目都能用)   ②  当前 project (&lt;cwd&gt;/.claude/skills/, 仅本 project)</text>
  <text x="100" y="349" font-size="11" fill="#92400e">用户已说时仍要二次确认 ("你说 user 级, 确认?")</text>
  <line x1="700" y1="362" x2="700" y2="382" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <rect x="80" y="390" width="1240" height="88" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.3"/>
  <text x="100" y="414" font-size="14" font-weight="700" fill="#9a3412">§3 检测目标冲突</text>
  <text x="100" y="435" font-size="12" fill="#334155">ls &lt;target&gt;/&lt;name&gt;/  存在 → 询问:</text>
  <text x="120" y="453" font-size="11" fill="#475569">① 覆盖 (会丢失本地修改)   ② 跳过 (取消安装)   ③ 装到别的名字 (e.g. &lt;name&gt;-v2)</text>
  <text x="100" y="471" font-size="11" fill="#9a3412">父目录不存在 → mkdir -p (不阻塞)</text>
  <line x1="700" y1="478" x2="700" y2="498" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <rect x="80" y="506" width="600" height="54" rx="8" fill="#2563eb" />
  <text x="94" y="529" font-size="14" font-weight="700" fill="#ffffff">路径 own — 直接 cp</text>
  <text x="94" y="549" font-size="11" fill="#dbeafe" fill-opacity="0.95">缓存 stub 即完整内容</text>
  <rect x="720" y="506" width="600" height="54" rx="8" fill="#059669" />
  <text x="734" y="529" font-size="14" font-weight="700" fill="#ffffff">路径 external — 拉 source_url + 回写 stub</text>
  <text x="734" y="549" font-size="11" fill="#d1fae5" fill-opacity="0.95">缓存只是薄指针, 必须现拉最新</text>
  <rect x="80" y="568" width="600" height="280" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1" stroke-opacity="0.35"/>
  <rect x="92" y="580" width="576" height="70" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#soft)"/>
  <text x="104" y="599" font-size="12.5" font-weight="700" fill="#2563eb">4a. cp -r 缓存 → 目标</text>
  <text x="104" y="614" font-size="10.5" fill="#475569">cp -r ~/.tranfu-labs/claude-skills/&lt;name&gt;/ &lt;target&gt;/&lt;name&gt;/</text>
  <text x="104" y="629" font-size="10.5" fill="#475569">原子操作 (失败不留半装)</text>
  <line x1="380" y1="650" x2="380" y2="666" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="92" y="668" width="576" height="60" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" filter="url(#soft)"/>
  <text x="104" y="687" font-size="12.5" font-weight="700" fill="#2563eb">(无 stub 回写步骤)</text>
  <text x="104" y="702" font-size="10.5" fill="#475569">own 的缓存就是源, 不需要 refresh</text>
  <rect x="720" y="568" width="600" height="280" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1" stroke-opacity="0.35"/>
  <rect x="732" y="580" width="576" height="68" rx="6" fill="#ffffff" stroke="#059669" stroke-width="1.2" filter="url(#soft)"/>
  <text x="744" y="599" font-size="12.5" font-weight="700" fill="#059669">4b-i. 临时下载 source_url</text>
  <text x="744" y="614" font-size="10.5" fill="#475569">tmp=$(mktemp -d); curl -L "$source_url" -o $tmp/...</text>
  <text x="744" y="629" font-size="10.5" fill="#475569">raw URL / repo 子路径 / 普通 URL — LLM 选实现</text>
  <line x1="1020" y1="648" x2="1020" y2="664" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="732" y="666" width="576" height="60" rx="6" fill="#ffffff" stroke="#059669" stroke-width="1.2" filter="url(#soft)"/>
  <text x="744" y="685" font-size="12.5" font-weight="700" fill="#059669">4b-ii. mkdir -p + cp 到 target</text>
  <text x="744" y="700" font-size="10.5" fill="#475569">失败 → 退回缓存 stub + 告知 "用了旧版本"</text>
  <line x1="1020" y1="726" x2="1020" y2="740" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="732" y="742" width="576" height="100" rx="6" fill="#ffffff" stroke="#059669" stroke-width="1.2" filter="url(#soft)"/>
  <text x="744" y="761" font-size="12.5" font-weight="700" fill="#059669">§5 回写 cache stub (实质 vs 非实质)</text>
  <text x="744" y="776" font-size="10.5" fill="#475569">读最新 frontmatter; 比对 cache stub name/desc/version</text>
  <text x="744" y="791" font-size="10.5" fill="#475569">5a 非实质 (typo/标点 / desc 长度差&lt;20%) → 本地 patch, 不 commit</text>
  <text x="744" y="806" font-size="10.5" fill="#475569">5b 实质 (version 变 / desc 长度差≥20%) → 自动 refresh PR</text>
  <rect x="1184" y="752" width="116" height="18" rx="9" fill="#fef3c7" stroke="#ca8a04" stroke-width="1"/>
  <text x="1242" y="765" text-anchor="middle" font-size="10" font-weight="600" fill="#854d0e">↪ auto gh pr create</text>
  <line x1="380" y1="848" x2="380" y2="884" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
  <line x1="1020" y1="842" x2="1020" y2="884" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <rect x="80" y="888" width="1240" height="70" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="1.3"/>
  <text x="100" y="912" font-size="14" font-weight="700" fill="#0f172a">§6 告知用户 + §7 dogfood log</text>
  <text x="100" y="932" font-size="12" fill="#334155">"已装到 &lt;target&gt;/&lt;name&gt;/. 重启 Claude Code 即可触发." (external 还会附 refresh PR URL)</text>
  <text x="100" y="950" font-size="11" fill="#64748b">append .dogfood-r1.log: ts, actor, event=install, skill, scope, origin, [cache_refresh=none|local-patch|pr-opened]</text>
  <rect x="80" y="974" width="1240" height="60" rx="8" fill="#0f172a"/>
  <text x="100" y="998" font-size="13" font-weight="700" fill="#f1f5f9">⛔ 关键约束 (What NOT to do)</text>
  <text x="100" y="1018" font-size="12" fill="#cbd5e1">不默认 scope (硬约束二次确认) · 不用 symlink · 不改用户本地原 skill 字段 · external refresh PR 不直推 main · 不调子 Agent · 不留半装状态 (mktemp + 原子 cp)</text>
</svg>
