<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 970" font-family="system-ui, -apple-system, &quot;PingFang SC&quot;, &quot;Helvetica Neue&quot;, Arial, sans-serif">
  <defs>
    <style>text{font-family:system-ui,-apple-system,"PingFang SC","Helvetica Neue",Arial,sans-serif;}</style>
    <marker id="arrow-gray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#ca8a04"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#dc2626"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1400" height="970" fill="#ffffff"/>
  <text x="700" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">search-skills — 框架图</text>
  <text x="700" y="68" text-anchor="middle" font-size="13" fill="#64748b">v0.1.0 · 关键词解析 → 候选目录 → frontmatter → 评分 → 排序 → top N · 全程 read-only</text>
  <rect x="80" y="92" width="1240" height="58" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="100" y="115" font-size="13" font-weight="600" fill="#475569">用户触发短语</text>
  <text x="100" y="136" font-size="12" fill="#334155">"搜公司 skill 关于 UI 设计的" · "公司库有没有 ts 类型推断" · "看看 tranfu-labs 有什么 skill" · "列一下公司 skill"</text>
  <rect x="1180" y="104" width="118" height="22" rx="11" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="1239" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">✓ read-only</text>
  <line x1="700" y1="150" x2="700" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <rect x="80" y="180" width="600" height="110" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#soft)"/>
  <text x="92" y="199" font-size="12.5" font-weight="700" fill="#7c3aed">§1 解析关键词</text>
  <text x="92" y="214" font-size="10.5" fill="#475569">砍套话: "搜 / 公司 / skill / 关于 / 的"</text>
  <text x="92" y="229" font-size="10.5" fill="#475569">按空格 split, lowercase; 中文不分词 整词 substring</text>
  <text x="92" y="244" font-size="10.5" fill="#475569">例: "搜公司 skill 关于 UI 设计的" → ["ui", "设计"]</text>
  <line x1="380" y1="290" x2="380" y2="310" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <rect x="80" y="310" width="600" height="110" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#soft)"/>
  <text x="92" y="329" font-size="12.5" font-weight="700" fill="#7c3aed">§2 列候选 skill 目录</text>
  <text x="92" y="344" font-size="10.5" fill="#475569">cd ~/.tranfu-labs/claude-skills/</text>
  <text x="92" y="359" font-size="10.5" fill="#475569">ls | grep -v '^\.' | grep -v '^_' \</text>
  <text x="92" y="374" font-size="10.5" fill="#475569">       | grep -vE '^(publish|search|install|update)-skills?$'  ← 跳 4 个 meta</text>
  <line x1="380" y1="420" x2="380" y2="440" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <rect x="80" y="440" width="600" height="110" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#soft)"/>
  <text x="92" y="459" font-size="12.5" font-weight="700" fill="#7c3aed">§3 读 frontmatter</text>
  <text x="92" y="474" font-size="10.5" fill="#475569">对每个候选目录 D: cat D/SKILL.md frontmatter</text>
  <text x="92" y="489" font-size="10.5" fill="#475569">抽 name / description / version / author / origin</text>
  <text x="92" y="504" font-size="10.5" fill="#475569">(yq / python -c 解析更稳, LLM 自选)</text>
  <line x1="380" y1="550" x2="380" y2="570" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <rect x="80" y="570" width="600" height="110" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#soft)"/>
  <text x="92" y="589" font-size="12.5" font-weight="700" fill="#7c3aed">§4 匹配评分</text>
  <text x="92" y="604" font-size="10.5" fill="#475569">关键词 in name (lowercase)       → +2</text>
  <text x="92" y="619" font-size="10.5" fill="#475569">关键词 in description (substring) → +1</text>
  <text x="92" y="634" font-size="10.5" fill="#475569">同一关键词重复命中只算一次; 跳过 0 命中</text>
  <rect x="720" y="180" width="600" height="110" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#soft)"/>
  <text x="732" y="199" font-size="12.5" font-weight="700" fill="#7c3aed">§5 排序</text>
  <text x="732" y="214" font-size="10.5" fill="#475569">按命中分 desc</text>
  <text x="732" y="229" font-size="10.5" fill="#475569">同分按 frontmatter updated_at desc</text>
  <text x="732" y="244" font-size="10.5" fill="#475569">稳定排序确保结果可复现</text>
  <line x1="1020" y1="290" x2="1020" y2="310" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <rect x="720" y="310" width="600" height="110" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#soft)"/>
  <text x="732" y="329" font-size="12.5" font-weight="700" fill="#7c3aed">§6 返回 top N (N = min(命中, 10))</text>
  <text x="732" y="344" font-size="10.5" fill="#475569">列号 + name + version + author + origin + description</text>
  <text x="732" y="359" font-size="10.5" fill="#475569">0 命中 → fallback 三选项 (换词重搜 / 自写 publish / 找外部推荐)</text>
  <text x="732" y="374" font-size="10.5" fill="#475569">❌ 不超过 10 个 (信噪比下降)</text>
  <line x1="1020" y1="420" x2="1020" y2="440" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <rect x="720" y="440" width="600" height="110" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#soft)"/>
  <text x="732" y="459" font-size="12.5" font-weight="700" fill="#7c3aed">§7 提示下一步</text>
  <text x="732" y="474" font-size="10.5" fill="#475569">"想装哪个? 我可以帮你装到 user 级 或 当前 project."</text>
  <text x="732" y="489" font-size="10.5" fill="#475569">"说 '装第 N 个到 user/project' 触发 install-skill."</text>
  <text x="732" y="504" font-size="10.5" fill="#475569">不主动 install (用户必须二次确认)</text>
  <line x1="1020" y1="550" x2="1020" y2="570" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <rect x="720" y="570" width="600" height="110" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.2" filter="url(#soft)"/>
  <text x="732" y="589" font-size="12.5" font-weight="700" fill="#7c3aed">§8 dogfood log</text>
  <text x="732" y="604" font-size="10.5" fill="#475569">append &lt;cache&gt;/.dogfood-r1.log</text>
  <text x="732" y="619" font-size="10.5" fill="#475569">{ts, actor, event=search, query, matches=N}</text>
  <text x="732" y="634" font-size="10.5" fill="#475569">仅末尾 append 一行 (read-only 操作)</text>
  <path d="M 680 625 L 700 625 L 700 165 L 720 165 L 720 180" stroke="#7c3aed" stroke-width="1.8" fill="none" marker-end="url(#arrow-purple)"/>
  <rect x="595" y="155" width="210" height="18" rx="9" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text x="700" y="168" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6d28d9">命中表 → 排序</text>
  <rect x="80" y="710" width="1240" height="70" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.3"/>
  <text x="100" y="734" font-size="14" font-weight="700" fill="#991b1b">0 命中分支 (§6 fallback)</text>
  <text x="100" y="754" font-size="12" fill="#334155">① 换关键词重搜    ② 你自己写一个 → publish-skill    ③ 找外部 skill → publish-skill --origin external</text>
  <text x="100" y="772" font-size="11" fill="#7f1d1d">缓存目录不存在 → 提示用户先 bootstrap (README 找两步命令)</text>
  <rect x="80" y="800" width="1240" height="60" rx="8" fill="#0f172a"/>
  <text x="100" y="824" font-size="13" font-weight="700" fill="#f1f5f9">⛔ 关键约束 (What NOT to do)</text>
  <text x="100" y="844" font-size="12" fill="#cbd5e1">❌ 不调 LLM 做语义搜索 (字面 grep + 关键字命中) · ❌ 不调子 Agent · ❌ 不主动 install · ❌ 不打开编辑器/浏览器 · ❌ 不修改任何文件 (仅 dogfood append) · ❌ 不返回 &gt;10 个</text>
  <text x="80" y="888" font-size="11" font-weight="600" fill="#64748b">输入 / 输出:</text>
  <text x="170" y="888" font-size="11" fill="#475569">用户关键词 → top N 命中列表 + 下一步 install 引导 + dogfood log 一行</text>
  <text x="80" y="912" font-size="11" font-weight="600" fill="#64748b">权限:</text>
  <text x="170" y="912" font-size="11" fill="#475569">只读访问 ~/.tranfu-labs/claude-skills/ ; 唯一写动作是末尾 .dogfood-r1.log append (单行)</text>
  <text x="80" y="936" font-size="11" font-weight="600" fill="#64748b">下游 skill:</text>
  <text x="170" y="936" font-size="11" fill="#475569">install-skill (用户基于结果二次确认; 不自动衔接)</text>
</svg>
