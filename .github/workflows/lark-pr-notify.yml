name: Notify Lark on new original skill

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Detect new own-skills subdirectory and notify Lark
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ACTION: ${{ github.event.action }}
        run: |
          set -euo pipefail

          if [ -z "${LARK_WEBHOOK_URL:-}" ]; then
            echo "::error::LARK_WEBHOOK_URL secret is not set."
            exit 1
          fi

          # Added own-skills/<name>/SKILL.md paths in this PR
          mapfile -t skill_files < <(
            gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate \
              --jq '.[] | select(.status == "added") | .filename' \
              | grep -E '^own-skills/[^/]+/SKILL\.md$' || true
          )

          if [ "${#skill_files[@]}" -eq 0 ]; then
            echo "No new own-skills/*/SKILL.md added; skipping notification."
            exit 0
          fi

          # On synchronize, only notify when SKILL.md was added in the latest push,
          # so we don't re-announce on every commit to the same PR.
          if [ "$ACTION" = "synchronize" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.event.after }}"
            mapfile -t pushed_added < <(
              gh api "repos/$REPO/compare/$BEFORE...$AFTER" \
                --jq '.files[]? | select(.status == "added") | .filename' \
                | grep -E '^own-skills/[^/]+/SKILL\.md$' || true
            )
            if [ "${#pushed_added[@]}" -eq 0 ]; then
              echo "Synchronize push did not add a new SKILL.md; skipping."
              exit 0
            fi
            skill_files=("${pushed_added[@]}")
          fi

          for path in "${skill_files[@]}"; do
            echo "::group::Process $path"

            content=$(gh api "repos/$REPO/contents/$path?ref=$HEAD_SHA" \
              --jq '.content' | base64 -d)

            # Extract YAML frontmatter (between the first two `---` lines)
            fm=$(printf '%s\n' "$content" \
              | awk 'BEGIN{n=0} /^---[[:space:]]*$/{n++; next} n==1{print} n>=2{exit}')

            name=$(printf '%s\n' "$fm" | sed -nE 's/^name:[[:space:]]+(.*)$/\1/p' | head -n1)
            description=$(printf '%s\n' "$fm" | sed -nE 's/^description:[[:space:]]+(.*)$/\1/p' | head -n1)

            # Strip surrounding quotes if present
            name="${name%\"}"; name="${name#\"}"; name="${name%\'}"; name="${name#\'}"
            description="${description%\"}"; description="${description#\"}"
            description="${description%\'}"; description="${description#\'}"

            : "${name:=${path#own-skills/}}"
            name="${name%/SKILL.md}"
            : "${description:=(未填 description)}"

            text=$(printf '【新增原创Skill】\n提交者：@%s\n名称：%s\n描述：%s\nPR：%s' \
              "$PR_AUTHOR" "$name" "$description" "$PR_URL")

            payload=$(jq -n --arg text "$text" '{msg_type:"text", content:{text:$text}}')

            echo "Payload:"
            echo "$payload"

            response=$(curl -sS -w "\n%{http_code}" -X POST \
              -H "Content-Type: application/json" \
              -d "$payload" "$LARK_WEBHOOK_URL")
            body=$(echo "$response" | sed '$d')
            code=$(echo "$response" | tail -n1)

            echo "HTTP $code"
            echo "$body"

            if [ "$code" != "200" ]; then
              echo "::error::Lark webhook returned HTTP $code"
              exit 1
            fi
            if echo "$body" | jq -e 'select(.code != null and .code != 0)' >/dev/null 2>&1; then
              echo "::error::Lark API error: $body"
              exit 1
            fi

            echo "::endgroup::"
          done
