name: Notify Lark on skill changes

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for .github/collaborators.json)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Detect skill changes and notify Lark
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail

          if [ -z "${LARK_WEBHOOK_URL:-}" ]; then
            echo "::error::LARK_WEBHOOK_URL secret is not set."
            exit 1
          fi

          # Closed-but-not-merged PRs are abandoned; no consumer cares — skip silently.
          if [ "$ACTION" = "closed" ] && [ "$MERGED" != "true" ]; then
            echo "PR closed without merge; skipping notification."
            exit 0
          fi

          # Feishu Card v2 markdown 支持 headers / tables / lists / code blocks,
          # 但仍不支持 task lists ([ ]/[x]). 转成 unicode (☐/☑) 让卡片可读.
          # 用一次, 后面 per-file / 其它两张卡都用 $pr_body_normalized.
          pr_body_normalized=$(printf '%s' "$PR_BODY" | sed -E \
            -e 's/^([[:space:]]*[-*+][[:space:]]+)\[ \]/\1☐/g' \
            -e 's/^([[:space:]]*[-*+][[:space:]]+)\[[xX]\]/\1☑/g')

          # Resolve PR author -> 昵称 via .github/collaborators.json (flat login→昵称 map).
          # Falls back to "@<login>" when no mapping exists or the file is missing.
          COLLAB_FILE=".github/collaborators.json"
          author_nick=""
          if [ -f "$COLLAB_FILE" ]; then
            author_nick=$(jq -r --arg k "$PR_AUTHOR" '.[$k] // empty' "$COLLAB_FILE" 2>/dev/null || true)
          fi
          if [ -n "$author_nick" ]; then
            DISPLAY_AUTHOR="$author_nick"
          else
            DISPLAY_AUTHOR="@$PR_AUTHOR"
          fi
          echo "PR author: $PR_AUTHOR -> display: $DISPLAY_AUTHOR"

          SKILL_LINE_RE='^[a-z]+	(own|external|meta)-skills/[^/]+/SKILL\.md$'

          # 1. Collect skill file changes from the PR. Each line: "<status>\t<path>".
          #    For synchronize, only consider files changed in this push so we
          #    don't re-announce on every commit.
          if [ "$ACTION" = "synchronize" ]; then
            mapfile -t changes < <(
              gh api "repos/$REPO/compare/$PUSH_BEFORE...$PUSH_AFTER" \
                --jq '.files[]? | "\(.status)\t\(.filename)"' \
                | grep -E "$SKILL_LINE_RE" || true
            )
          else
            mapfile -t changes < <(
              gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate \
                --jq '.[] | "\(.status)\t\(.filename)"' \
                | grep -E "$SKILL_LINE_RE" || true
            )
          fi

          if [ "${#changes[@]}" -eq 0 ]; then
            echo "No SKILL.md changes in scope; sending '其它' card."

            # Collect ALL changed files (any path) so the card can show what
            # this PR is actually about (CI / docs / templates / configs).
            if [ "$ACTION" = "synchronize" ]; then
              mapfile -t other_files < <(
                gh api "repos/$REPO/compare/$PUSH_BEFORE...$PUSH_AFTER" \
                  --jq '.files[]?.filename' || true
              )
            else
              mapfile -t other_files < <(
                gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate \
                  --jq '.[].filename' || true
              )
            fi

            other_count="${#other_files[@]}"
            if [ "$other_count" -eq 0 ]; then
              echo "No file changes at all; truly skipping."
              exit 0
            fi

            # First 5 paths as preview; show "+N more" if truncated.
            preview=""
            for f in "${other_files[@]:0:5}"; do
              preview="${preview}- \`${f}\`\n"
            done
            more_count=$((other_count - 5))
            if [ "$more_count" -gt 0 ]; then
              preview="${preview}- _(还有 ${more_count} 个文件)_"
            fi

            # Header + color
            other_action_label="其它变更"
            other_color="grey"
            [ -z "$author_nick" ] && other_color="yellow"
            if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
              other_action_label="已合并 · ${other_action_label}"
              other_color="green"
            fi
            other_header_title="📦 ${other_action_label} · ${PR_TITLE}"

            other_payload=$(jq -n \
              --arg header_title "$other_header_title" \
              --arg color "$other_color" \
              --arg display_author "$DISPLAY_AUTHOR" \
              --arg file_count "$other_count" \
              --arg preview "$preview" \
              --arg pr_title "$PR_TITLE" \
              --arg pr_body "$pr_body_normalized" \
              --arg pr_url "$PR_URL" \
              --arg pr_number "$PR_NUMBER" \
              --arg repo "$REPO" \
              '
              def col(content): {tag: "column", width: "weighted", weight: 1,
                                 elements: [{tag: "markdown", content: content}]};

              {
                msg_type: "interactive",
                card: {
                  schema: "2.0",
                  header: {
                    title: {tag: "plain_text", content: $header_title},
                    template: $color
                  },
                  body: {
                    elements: [
                      {tag: "column_set", columns: [
                        col("**提交者**\n" + $display_author),
                        col("**类别**\n其它"),
                        col("**文件数**\n" + $file_count + " 个")
                      ]},
                      {tag: "markdown", content: ("**变更文件 (≤5)**\n" + $preview)},
                      {tag: "markdown", content:
                        ("**PR 描述**\n"
                         + (if $pr_body != "" then $pr_body else "_(无 PR 描述)_" end))},
                      {tag: "hr"},
                      {tag: "note", content: [{tag: "plain_text",
                        content: ($repo + " · PR #" + $pr_number)}]},
                      {tag: "button",
                       text: {tag: "plain_text", content: "Open PR"},
                       type: "primary", width: "fill", url: $pr_url}
                    ]
                  }
                }
              }
              ')

            echo "Other-card payload:"
            echo "$other_payload"

            response=$(curl -sS -w "\n%{http_code}" -X POST \
              -H "Content-Type: application/json" \
              -d "$other_payload" "$LARK_WEBHOOK_URL")
            body=$(echo "$response" | sed '$d')
            code=$(echo "$response" | tail -n1)

            echo "HTTP $code"
            echo "$body"

            if [ "$code" != "200" ]; then
              echo "::error::Lark webhook returned HTTP $code"
              exit 1
            fi
            if echo "$body" | jq -e 'select(.code != null and .code != 0)' >/dev/null 2>&1; then
              echo "::error::Lark API error: $body"
              exit 1
            fi
            exit 0
          fi

          # cap to keep the bot from spamming on bulk PRs
          MAX=10
          if [ "${#changes[@]}" -gt "$MAX" ]; then
            echo "::warning::Truncating ${#changes[@]} skill changes to first $MAX"
            changes=("${changes[@]:0:$MAX}")
          fi

          fetch_frontmatter_field() {
            # $1 = ref, $2 = path, $3 = field
            gh api "repos/$REPO/contents/$2?ref=$1" --jq '.content' 2>/dev/null \
              | base64 -d 2>/dev/null \
              | awk 'BEGIN{n=0} /^---[[:space:]]*$/{n++; next} n==1{print} n>=2{exit}' \
              | sed -nE "s/^$3:[[:space:]]+(.*)\$/\\1/p" \
              | head -n1 \
              | sed -E "s/^[\"\']//; s/[\"\']\$//"
          }

          for line in "${changes[@]}"; do
            status="${line%%	*}"
            path="${line#*	}"
            echo "::group::$status $path"

            # category from path
            top="${path%%/*}"               # own-skills | external-skills | meta-skills
            rest="${path#*/}"               # <name>/SKILL.md
            skill_name="${rest%/SKILL.md}"

            case "$top" in
              own-skills)      category="原创";     cat_emoji="🧩" ;;
              external-skills) category="推荐";     cat_emoji="🌐" ;;
              meta-skills)     category="Meta";    cat_emoji="🛠"  ;;
              *)               category="$top";    cat_emoji="📦"  ;;
            esac

            # Author fallback: PR author 不在 collaborators.json 时, 整张卡片归为"其它"
            # 类别, 描述字段换成 PR title + body 原文 (让人工 review 判断).
            unmapped_author=0
            if [ -z "$author_nick" ]; then
              category="其它"
              cat_emoji="❓"
              unmapped_author=1
            fi

            # event-specific header (title + Lark template color)
            case "$status" in
              added)
                action_label="新增${category} Skill"
                color="blue"
                [ "$category" = "推荐" ] && color="green"
                [ "$category" = "Meta" ] && color="purple"
                ;;
              removed)
                action_label="删除${category} Skill"; color="red" ;;
              modified)
                action_label="更新${category} Skill"; color="grey" ;;
              renamed|copied)
                action_label="重命名${category} Skill"; color="orange" ;;
              *)
                action_label="${status} ${category} Skill"; color="grey" ;;
            esac
            # 未映射作者一律用 yellow, 视觉上提示需要人工 review
            [ "$unmapped_author" = "1" ] && color="yellow"

            # Merge event: prepend "已合并" badge and force green to visually
            # distinguish from open/synchronize cards. Consumer signal: 现在可以
            # 跑 update-skills 拉到这一变更.
            if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
              action_label="已合并 · ${action_label}"
              color="green"
            fi

            # Read frontmatter from the appropriate ref.
            # - added/modified/renamed: read from HEAD
            # - removed: read from BASE (file no longer at HEAD)
            if [ "$status" = "removed" ]; then
              ref="$BASE_SHA"
            else
              ref="$HEAD_SHA"
            fi
            name=$(fetch_frontmatter_field "$ref" "$path" name      || true)
            desc=$(fetch_frontmatter_field "$ref" "$path" description || true)
            version=$(fetch_frontmatter_field "$ref" "$path" version || true)
            author_fm=$(fetch_frontmatter_field "$ref" "$path" author || true)

            : "${name:=$skill_name}"
            : "${desc:=(未填 description)}"

            # For modified: show old → new version when both exist and differ
            version_display="$version"
            if [ "$status" = "modified" ]; then
              old_version=$(fetch_frontmatter_field "$BASE_SHA" "$path" version || true)
              if [ -n "$old_version" ] && [ -n "$version" ] && [ "$old_version" != "$version" ]; then
                version_display="$old_version → $version"
              fi
            fi

            header_title="${cat_emoji} ${action_label} · ${name}"

            payload=$(jq -n \
              --arg header_title "$header_title" \
              --arg color "$color" \
              --arg pr_author "$PR_AUTHOR" \
              --arg display_author "$DISPLAY_AUTHOR" \
              --arg category "$category" \
              --arg author_fm "$author_fm" \
              --arg version "$version_display" \
              --arg path "$path" \
              --arg desc "$desc" \
              --arg pr_url "$PR_URL" \
              --arg pr_number "$PR_NUMBER" \
              --arg repo "$REPO" \
              --arg unmapped "$unmapped_author" \
              --arg pr_title "$PR_TITLE" \
              --arg pr_body "$pr_body_normalized" \
              '
              def col(content): {tag: "column", width: "weighted", weight: 1,
                                 elements: [{tag: "markdown", content: content}]};

              ($display_author
                + (if $author_fm != "" and $author_fm != $pr_author and $author_fm != $display_author
                   then "\n_(frontmatter: " + $author_fm + ")_"
                   else "" end)) as $submitter |

              ([col("**提交者**\n" + $submitter), col("**类别**\n" + $category)]
                + (if $version != "" then [col("**版本**\n" + $version)] else [] end)
              ) as $cols |

              {
                msg_type: "interactive",
                card: {
                  schema: "2.0",
                  header: {
                    title: {tag: "plain_text", content: $header_title},
                    template: $color
                  },
                  body: {
                    elements: [
                      {tag: "column_set", columns: $cols},
                      {tag: "markdown", content: ("**文件**\n`" + $path + "`")},
                      (if $unmapped == "1"
                       then {tag: "markdown", content:
                         ("**PR 原文** _(作者未在协作者表, 请人工 review)_\n"
                          + "**标题**: " + $pr_title + "\n\n"
                          + (if $pr_body != "" then $pr_body else "_(无 PR 描述)_" end))}
                       else {tag: "markdown", content: ("**描述**\n" + $desc)}
                       end),
                      {tag: "hr"},
                      {tag: "note", content: [{tag: "plain_text",
                        content: ($repo + " · PR #" + $pr_number)}]},
                      {tag: "button",
                       text: {tag: "plain_text", content: "Open PR"},
                       type: "primary", width: "fill", url: $pr_url}
                    ]
                  }
                }
              }
              ')

            echo "Payload:"
            echo "$payload"

            response=$(curl -sS -w "\n%{http_code}" -X POST \
              -H "Content-Type: application/json" \
              -d "$payload" "$LARK_WEBHOOK_URL")
            body=$(echo "$response" | sed '$d')
            code=$(echo "$response" | tail -n1)

            echo "HTTP $code"
            echo "$body"

            if [ "$code" != "200" ]; then
              echo "::error::Lark webhook returned HTTP $code"
              exit 1
            fi
            if echo "$body" | jq -e 'select(.code != null and .code != 0)' >/dev/null 2>&1; then
              echo "::error::Lark API error: $body"
              exit 1
            fi

            echo "::endgroup::"
          done
