name: Build index.json
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "meta-skills/**"
      - "own-skills/**"
      - "external-skills/**"
      - "scripts/build-index.mjs"
      - ".github/workflows/build-index.yml"
      - "package.json"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # PR 上默认 checkout 的是 refs/pull/N/merge (merge commit) — 没问题, 因为
          # validate 已忽略 generated_at, 不再依赖 commit date.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Snapshot committed index.json
        run: cp index.json /tmp/committed-index.json
      - run: npm run build:index
      - name: Verify index.json skills up-to-date
        # 只比对 skills 数组 (内容), 忽略 generated_at — 它每次 build 都变 (new Date()),
        # 也会被 squash merge 重置, 拿它做 diff 触发器会让 CI 死循环 fail.
        # 真正要拦的是: 作者改了 skill 但忘跑 npm run build:index → skills 数组里 sha/files/description 落后.
        run: |
          if ! diff <(jq -S 'del(.generated_at)' /tmp/committed-index.json) <(jq -S 'del(.generated_at)' index.json) > /dev/null; then
            echo "::error::index.json 的 skills 数据落后. 请在本地跑 'npm run build:index' 然后把 index.json 一起 commit 进 PR."
            echo "--- diff (忽略 generated_at) ---"
            diff <(jq -S 'del(.generated_at)' /tmp/committed-index.json) <(jq -S 'del(.generated_at)' index.json) || true
            exit 1
          fi
          echo "index.json OK — $(node -e "console.log(require('./index.json').skills.length)") skills indexed"
