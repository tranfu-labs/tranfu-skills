name: Build index.json
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "meta-skills/**"
      - "own-skills/**"
      - "external-skills/**"
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm run build:index
      - if: github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet index.json; then
            echo "::error::index.json out of date. Run 'npm run build:index' locally and commit."
            exit 1
          fi
      - if: github.event_name == 'push'
        run: |
          if ! git diff --quiet index.json; then
            git config user.name "tranfu-ci"
            git config user.email "ci@tranfu-labs.local"
            git add index.json
            git commit -m "ci: rebuild index.json"
            git push
          fi
