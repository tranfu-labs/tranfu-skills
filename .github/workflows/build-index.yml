name: Build index.json
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "meta-skills/**"
      - "own-skills/**"
      - "external-skills/**"
      - "scripts/build-index.mjs"
      - ".github/workflows/build-index.yml"
      - "package.json"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # PR 上默认 checkout 的是 refs/pull/N/merge (merge commit),
          # 它的 author date 跟 PR head commit 对不上, build-index.mjs 里
          # `git log -1 --format=%aI HEAD` 拿到的时间会跟作者本地不一致 → diff 永远非空.
          # 显式指定 head sha, 让 CI 上的 HEAD 等于 PR head commit.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm run build:index
      - name: Verify index.json up-to-date
        # 不再 main 上自动 commit + push (跟 "必须走 PR" 的 branch rule 冲突).
        # 改成 PR 上 validate — 作者本地必须跑过 npm run build:index 且把 index.json 一起 commit 进 PR.
        # tranfu-publish skill 已把这步列进 task list, 不容易漏.
        run: |
          if ! git diff --quiet index.json; then
            echo "::error::index.json 不是最新的. 请在本地跑 'npm run build:index' 然后把 index.json 一起 commit 进 PR."
            echo "--- index.json diff ---"
            git diff index.json
            exit 1
          fi
          echo "index.json OK — $(node -e "console.log(require('./index.json').skills.length)") skills indexed"
