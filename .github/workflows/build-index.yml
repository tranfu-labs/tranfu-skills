name: Build index.json
on:
  pull_request:
    paths:
      - "meta-skills/**"
      - "own-skills/**"
      - "external-skills/**"
      - "scripts/build-index.mjs"
      - ".github/workflows/build-index.yml"
      - "package.json"
      - "index.json"
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: run validator unit tests
        run: npm test
      - name: validate (changed only on PR, all on push)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run validate
          else
            npm run validate:all
          fi
      - name: collect validate JSON on failure
        if: failure()
        run: npm run validate:json > /tmp/validate.json || true
      - name: upload validate-output artifact on failure
        # lark-ci-notify.yml 通过 workflow_run 触发后会下载此 artifact 渲染错误明细.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validate-output
          path: /tmp/validate.json
          retention-days: 7
      # PR comment 现由 lark-ci-notify.yml 在 workflow_run 触发后渲染 (Q1),
      # 跟 Lark 卡内容同款: SKILL 改动 + 按 validator 分组 + 全部错误明细 + 复跑命令.
      - run: npm run build:index
      - name: Publish index.json to rolling `catalog` release
        # 仅 main push 触发. PR 上只跑 build:index 做 sanity check, 不发布.
        # 新 CLI (0.4+) 从 release `catalog` tag 拉 index.json; git 里那份是老 CLI (0.3.x) 兼容快照.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete catalog --yes --cleanup-tag 2>/dev/null || true
          gh release create catalog index.json \
            --title "Catalog (latest)" \
            --notes "Auto-generated from main@$(git rev-parse --short HEAD)" \
            --latest
