name: Build index.json
on:
  pull_request:
    paths:
      - "meta-skills/**"
      - "own-skills/**"
      - "external-skills/**"
      - "scripts/build-index.mjs"
      - ".github/workflows/build-index.yml"
      - "package.json"
      - "index.json"
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: run validator unit tests
        run: npm test
      - name: validate (changed only on PR, all on push)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run validate
          else
            npm run validate:all
          fi
      - name: collect validate JSON on failure
        if: failure()
        run: npm run validate:json > /tmp/validate.json || true
      - name: post PR comment with repro command
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## validate-all failed"
            echo ""
            echo "Reproduce locally:"
            echo '```'
            echo 'npm run validate -- --json'
            echo '```'
            echo ""
            echo "<details><summary>Structured output</summary>"
            echo ""
            echo '```json'
            cat /tmp/validate.json 2>/dev/null || echo "{}"
            echo '```'
            echo "</details>"
          } > /tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md || true
      - run: npm run build:index
      - name: Publish index.json to rolling `catalog` release
        # 仅 main push 触发. PR 上只跑 build:index 做 sanity check, 不发布.
        # 新 CLI (0.4+) 从 release `catalog` tag 拉 index.json; git 里那份是老 CLI (0.3.x) 兼容快照.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete catalog --yes --cleanup-tag 2>/dev/null || true
          gh release create catalog index.json \
            --title "Catalog (latest)" \
            --notes "Auto-generated from main@$(git rev-parse --short HEAD)" \
            --latest
