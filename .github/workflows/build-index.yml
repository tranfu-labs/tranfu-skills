name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: run validator unit tests
        run: npm test
      - name: validate (changed only on PR, all on push)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run validate
          else
            npm run validate:all
          fi
      - name: virustotal scan (PR, changed skills only; soft-fail on errors)
        # 仅 PR 跑; fork PR 无 secret → script 自己降级 warning, 不挂 CI.
        # 阈值 malicious≥3 才 fail; rate-limit / 网络异常 / 超时一律 soft-fail.
        if: github.event_name == 'pull_request'
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: npm run validate:vt
      - name: collect validate JSON on failure
        if: failure()
        run: npm run validate:json > /tmp/validate.json || true
      - name: upload validate-output artifact on failure
        # 保留失败明细 artifact, 方便在 GitHub Actions 页面排查校验错误.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validate-output
          path: /tmp/validate.json
          retention-days: 7
      - run: npm run build:index
      - name: Publish index.json to rolling `catalog` release
        # 仅 main push 触发. PR 上只跑 build:index 做 sanity check, 不发布.
        # 新 CLI (0.4+) 从 release `catalog` tag 拉 index.json; git 里那份是老 CLI (0.3.x) 兼容快照.
        # 用 softprops/action-gh-release: 覆盖式发布, 不删旧 tag/release, 规避 `gh release delete --cleanup-tag` 后立刻重建同名 tag 导致 release 落为 draft 的 race condition.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: catalog
          name: "Catalog (latest)"
          body: "Auto-generated from main@${{ github.sha }}"
          files: index.json
          make_latest: "true"
