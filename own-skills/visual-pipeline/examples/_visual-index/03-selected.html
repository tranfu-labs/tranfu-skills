<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI 审查 - Layer 查看器</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="sticky top-0 z-30 border-b border-slate-300 bg-white">
    <div class="mx-auto max-w-7xl px-4 py-3 sm:px-6">
      <div class="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-500">UI 审查协议 r2 - Layer 查看器</div>
      <nav class="flex flex-wrap gap-2" id="tabs" aria-label="Layer 标签页">
        <button data-layer="l1" class="tab border px-3 py-1.5 text-sm font-medium">Layer 1 — IA</button>
        <button data-layer="l2" class="tab border px-3 py-1.5 text-sm font-medium">Layer 2 — Skeleton</button>
        <button data-layer="l3" class="tab border px-3 py-1.5 text-sm font-medium">Layer 3 — Components</button>
        <button data-layer="l4" class="tab border px-3 py-1.5 text-sm font-medium">Layer 4 — Assembly</button>
      </nav>
    </div>
  </header>

  <main id="content" class="mx-auto max-w-7xl px-4 py-6 sm:px-6"></main>

  <script>
    const regionStyles = {
      R1: { chip: 'bg-blue-100 text-blue-900 border-blue-300', box: 'border-blue-500 bg-blue-50', ring: 'ring-blue-500', name: 'batch-meta-strip' },
      R2: { chip: 'bg-purple-100 text-purple-900 border-purple-300', box: 'border-purple-500 bg-purple-50', ring: 'ring-purple-500', name: 'filter-chip' },
      R3: { chip: 'bg-emerald-100 text-emerald-900 border-emerald-300', box: 'border-emerald-500 bg-emerald-50', ring: 'ring-emerald-500', name: 'primary-region' },
      R4: { chip: 'bg-orange-100 text-orange-900 border-orange-300', box: 'border-orange-500 bg-orange-50', ring: 'ring-orange-500', name: 'detail-region' },
      R6: { chip: 'bg-slate-100 text-slate-800 border-slate-300', box: 'border-slate-400 bg-slate-50', ring: 'ring-slate-400', name: 'footer-meta' }
    };

    const regionDescriptions = {
      R1: '顶部 batch 摘要',
      R2: '主列表过滤',
      R3: '主列表区',
      R4: '明细区',
      R6: '底部辅助信息'
    };

    const regionContent = {
      R1: ['数据源路径', 'runs 总数', 'crash 总数', '最近扫描时间', '当前过滤状态摘要'],
      R2: ['crash skill 过滤 chip', '过滤后同步主列表'],
      R3: ['skill bar 卡片', 'with-skills pass-rate 大数字', 'no-skills / with-skills 双 bar', 'mode-delta 小字', 'crash 标记', '排序选择'],
      R4: ['skill 头', 'Case 切换器', 'Trace mode 切换器 + run.meta 元信息 (第 1 行)', 'ts 翻页 (第 2 行)', 'Task / Chat / Result 三 tab'],
      R6: ['pagination', '上一 run 快速跳转', '下一 run 快速跳转']
    };

    const regionMapRows = [
      ['skill 列表 + with-skills pass-rate', '主列表卡片标题行 + With Skill bar'],
      ['no-skills pass-rate', '主列表卡片 No Skill bar'],
      ['mode-delta on skill', '主列表卡片双 bar 长度差 + Δ 小字'],
      ['crash count (per skill / total)', '顶部摘要条 + 主列表过滤 chip + 卡片小图标'],
      ['latest ts', '明细 Trace 行当前 timestamp'],
      ['case 列表 / case-level mode-delta', '明细 Case pills，默认 argmax|Δ|'],
      ['(skill, case, mode) latest run', '明细 Trace 第 1+2 行 + 三 tab 内容'],
      ['stage status + per-stage duration', 'Chat tab 底部折叠"执行日志"每段消息头'],
      ['total duration / token / pass-fail', 'Trace 第 1 行元信息'],
      ['case-input.md', 'Task tab'],
      ['run-instruction.md / extract-instruction.md / judge-instruction.md', 'Task tab 二级 sub-tab'],
      ['output.md', 'Result tab "最终文档" 子区 (默认)'],
      ['report.md', 'Result tab "最终文档" 子区 sub-tab'],
      ['extracted.json', 'Result tab "结构化产物" 子区 (默认)'],
      ['score.json', 'Result tab "结构化产物" 子区 sub-tab'],
      ['gold.json', 'Result tab "判定" 子区 查看 gold 入口'],
      ['refs_loaded expected / actual / missing', 'Result tab "判定" 子区 refs 一行'],
      ['run.stderr.log / extract.stderr.log / judge.stderr.log', 'Chat tab 底部折叠 "执行日志" (✗ 段默认展开)'],
      ['run.meta.json', 'Trace 第 1 行元信息'],
      ['total runs / last indexed / source path', '顶部摘要条'],
      ['failed-runs roster', '主列表过滤 chip 收口'],
      ['(skill, case, mode) 相邻 ts 切换', 'Trace 第 2 行 ts 翻页'],
      ['metric × ts 大表 / historical runs 大列表', '不做'],
      ['skill-snapshot/', '不做 (暂不展示, 见 non-features)']
    ];

    const flows = [
      {
        title: '进入',
        nodes: ['顶部摘要', '主列表 bar 卡片', '明细空状态'],
        action: '入口态'
      },
      {
        title: '钻入明细',
        nodes: ['点主列表卡片', '卡片高亮', '明细加载: skill / Case / Trace / Task'],
        action: '钻入明细'
      },
      {
        title: '切换 case',
        nodes: ['点某个 Case pill', 'Trace 元信息刷新', '当前 tab 内容刷新'],
        action: 'Case 变更'
      },
      {
        title: '切换 trace mode',
        nodes: ['点 No Skills / With Skills', 'timestamp 回到 latest', 'Chat / Result 内容跟随 mode 变化'],
        action: 'mode 变更'
      },
      {
        title: '翻 timestamp',
        nodes: ['点上一次 / 下一次', '当前 timestamp 切换', '元信息和 tab 内容刷新'],
        action: '同 case/mode 下翻页'
      },
      {
        title: '切换 Tab',
        nodes: ['点 Task / Chat / Result', '内容区切换', '保留 skill / case / mode'],
        action: 'tab 变更'
      },
      {
        title: 'Filter Failed',
        nodes: ['点 crash 过滤 chip', '主列表过滤', '点过滤后的卡片进入明细'],
        action: 'crash 过滤'
      }
    ];

    const validationRows = [
      ['场景 #1: 批后扫读', ['进入', '顶部摘要', '主列表 bar 卡片'], '0 步'],
      ['场景 #2: 调试单 run', ['进入', '主列表卡片', '明细', 'Chat / Result tab'], '2 步'],
      ['场景 #3: 跨 ts 退化版', ['进入', '主列表卡片', '明细', 'Trace 翻 timestamp'], '3 步'],
      ['Failed roster', ['进入', 'crash 过滤', '主列表过滤', '明细'], '2 步']
    ];

    const scenarioStyles = {
      S1: 'border-sky-300 bg-sky-100 text-sky-950',
      S2: 'border-amber-300 bg-amber-100 text-amber-950',
      S3: 'border-violet-300 bg-violet-100 text-violet-950'
    };

    const scenarios = [
      {
        id: 'S1',
        title: '批后扫读',
        short: '刚跑完一批',
        body: '看整体 pass/fail、with-skills vs no-skills 差异和最新报告。'
      },
      {
        id: 'S2',
        title: '调试单 run',
        short: '某个 run 失败',
        body: '快速打开 stderr / instruction / output / score，定位 stage 或 metric 问题。'
      },
      {
        id: 'S3',
        title: '比较时间戳 (退化版)',
        short: '上一次 vs 这一次',
        body: '在 Trace 行用上一次 / 下一次翻页, 不展开趋势大表。'
      }
    ];

    const representativeQuestions = [
      ['Q1', '哪个 skill 的 with-skills 提升最大?', 'S1'],
      ['Q2', 'skill X 的 case Y 在两 mode 下分数差多少?', 'S1'],
      ['Q3', 'skill X 的 case Y 最近一次 run 的状态? PASS: latest 是默认 trace。', 'S2'],
      ['Q4', '上一次和这一次相比发生了什么? 部分降级: 只用 Trace 翻页逐个看。', 'S3'],
      ['Q5', 'latest run 里哪些 metric 没过，原因是什么?', 'S2'],
      ['Q8', '这个 run 的模型实际输出 output.md 是什么?', 'S2']
    ];

    const cognitiveFlows = [
      {
        label: 'Flow A',
        title: '扫读最新整体状态',
        scenarios: ['S1'],
        steps: ['进入工具', '默认看到 batch 摘要和 skill bar 卡片', '按 mode-delta / latest ts / crash count 排序', '扫 with-skills 大数字和两根 bar 的长度差', '点某 skill 进入明细']
      },
      {
        label: 'Flow B',
        title: 'debug 单 run',
        scenarios: ['S2'],
        steps: ['从主列表卡片定位 skill', 'Case 默认落到变化最大的 case', 'Trace 选 No Skills 或 With Skills', '切 Chat 看当时模型对话, 失败时展开底部"执行日志"', '切 Result 看最终文档 / 结构化产物 / 判定']
      },
      {
        label: 'Flow D',
        title: '跨 skill/case 找 crash runs',
        scenarios: ['S1', 'S2'],
        steps: ['点主列表上方 crash 过滤 chip', '主列表只保留 crash 或低 pass-rate skill', '卡片仍显示双 bar 和 Δ', '点击卡片进入同一套明细']
      },
      {
        label: 'Flow E',
        title: '阅读输入 / 对话 / 判定',
        scenarios: ['S2', 'S3'],
        steps: ['Task tab 看 case-input 和三段 instruction', 'Chat tab 看 AI 当时执行的原始对话 (system / user / assistant)', 'Result tab "最终文档" 看 output.md / report.md', 'Result tab "结构化产物" 看 extracted.json / score.json', 'Result tab "判定" 看 metric / refs / gold / facts diff']
      }
    ];

    function scenarioChip(id, compact = false) {
      const scenario = scenarios.find(item => item.id === id);
      return `<span class="inline-flex items-center border px-2 py-0.5 text-xs font-semibold ${scenarioStyles[id]}">${scenario.title}</span>`;
    }

    function renderSectionFrame(id, title, kicker, accentClass, body, strong = false) {
      return `
        <section class="border ${strong ? 'border-slate-900 bg-white' : 'border-slate-300 bg-white'}">
          <div class="border-l-8 ${accentClass} p-4 sm:p-5">
            <div class="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-500">${id}. ${title} · ${kicker}</div>
            <h1 class="mb-4 text-2xl font-semibold">${title}</h1>
            ${body}
          </div>
        </section>
      `;
    }

    function renderPersonaSection() {
      return renderSectionFrame('一', '谁在用这个工具', '用户 / 场景 / 边界', 'border-sky-500 bg-sky-50/70', `
        <div class="grid gap-4 lg:grid-cols-[1.05fr_1.2fr]">
          <div class="space-y-3">
            <div class="border border-sky-200 bg-white p-4">
              <div class="mb-2 text-sm font-semibold text-slate-900">核心用户</div>
              <ul class="space-y-2 text-sm leading-6 text-slate-700">
                <li class="border-l-2 border-sky-300 pl-2">skill-eval 维护者 + 调试者。</li>
                <li class="border-l-2 border-sky-300 pl-2">熟悉 CLI、run 目录、score/report 文件。</li>
                <li class="border-l-2 border-sky-300 pl-2">跑完一批 case 后，需要快速扫出可疑 run。</li>
              </ul>
            </div>
            <div class="border border-sky-200 bg-white p-4">
              <div class="mb-2 text-sm font-semibold text-slate-900">关键习惯 / 认知边界</div>
              <ul class="space-y-2 text-sm leading-6 text-slate-700">
                <li class="border-l-2 border-slate-300 pl-2">看到花哨视觉会反弹，优先要可扫读。</li>
                <li class="border-l-2 border-slate-300 pl-2">看到照搬物件会判定“没动脑”。</li>
                <li class="border-l-2 border-slate-300 pl-2">需要桌面 + 移动两张截图才认可。</li>
              </ul>
            </div>
          </div>
          <div class="grid gap-3 sm:grid-cols-3 lg:grid-cols-1">
            ${scenarios.map(scenario => `
              <div class="border border-slate-300 bg-white p-4">
                <div class="mb-2">${scenarioChip(scenario.id)}</div>
                <div class="mb-1 text-sm font-semibold text-slate-900">${scenario.short}</div>
                <div class="text-sm leading-6 text-slate-700">${scenario.body}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `);
    }

    function renderQuestionSection() {
      return renderSectionFrame('二', '他/她想得到什么信息', '代表性 query patterns', 'border-amber-500 bg-amber-50/70', `
        <div class="grid gap-3 md:grid-cols-2 xl:grid-cols-3">
          ${representativeQuestions.map(([qid, question, scenarioId]) => `
            <div class="border border-amber-200 bg-white p-4">
              <div class="mb-3 flex items-center justify-between gap-2">
                <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">${qid}</span>
                ${scenarioChip(scenarioId, true)}
              </div>
              <div class="text-sm font-semibold leading-6 text-slate-900">${question}</div>
            </div>
          `).join('')}
        </div>
      `);
    }

    function renderOperationSection() {
      return renderSectionFrame('三', '为此他/她会走哪些操作步骤', '用户脑里的 flow，不是页面框', 'border-violet-500 bg-violet-50/70', `
        <div class="grid gap-3 lg:grid-cols-2">
          ${cognitiveFlows.map(flow => `
            <div class="border border-violet-200 bg-white p-4">
              <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
                <div>
                  <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">${flow.label}</div>
                  <div class="text-sm font-semibold text-slate-900">${flow.title}</div>
                </div>
                <div class="flex flex-wrap gap-1">${flow.scenarios.map(id => scenarioChip(id, true)).join('')}</div>
              </div>
              <ol class="space-y-2 text-sm leading-6 text-slate-700">
                ${flow.steps.map((step, index) => `<li class="grid grid-cols-[24px_1fr] gap-2"><span class="border border-violet-200 bg-violet-50 text-center text-xs font-semibold text-violet-900">${index + 1}</span><span>${step}</span></li>`).join('')}
              </ol>
            </div>
          `).join('')}
        </div>
      `);
    }

    function regionChip(label) {
      const key = (label.match(/R[1-6]/) || [])[0];
      if (!key) return `<span class="border border-slate-300 bg-white px-2 py-0.5 text-xs">${label}</span>`;
      return `<span class="inline-flex items-center border px-2 py-0.5 text-xs font-semibold ${regionStyles[key].chip}">${label}</span>`;
    }

    function regionBox(id, title, body, extra = '') {
      const s = regionStyles[id];
      return `
        <button type="button" data-region="${id}" class="region-box w-full border-2 p-3 text-left transition ${s.box} ${extra}">
          <div class="mb-1 flex items-center justify-between gap-2">
            ${regionChip(id)}
            <span class="text-xs font-semibold text-slate-600">${title}</span>
          </div>
          <div class="text-xs leading-relaxed text-slate-700">${body}</div>
        </button>
      `;
    }

    function visualBox(id, title, body, extra = '') {
      const s = regionStyles[id];
      // 用 div 而不是 button: detailContent / overviewCards 内部含真实可点 button,
      // 嵌套 button 会被浏览器自动闭合外层, 把内部内容挤出去 (这是状态二崩坏的根因).
      return `
        <div role="button" tabindex="0" data-region="${id}" class="region-box block w-full cursor-pointer border-2 p-3 text-left transition ${s.box} ${extra}">
          <div class="mb-2 text-sm font-semibold text-slate-900">${title}</div>
          <div class="text-xs leading-relaxed text-slate-700">${body}</div>
        </div>
      `;
    }

    function regionLegend(extra = '') {
      return `
        <div class="border-l-4 border-slate-300 bg-slate-50 px-3 py-2 text-xs leading-6 text-slate-600 ${extra}">
          图例: 本图『顶部摘要条』对应 skeleton 文档的 R1 (batch-meta-strip);
          R2 view-switcher 已取消, 过滤 chip 已并入主列表头部 (filter-chip inline);
          『主列表区』= R3 (primary-region);
          『明细面板』= R4 (detail-region);
          R5 已彻底取消; 11 类 artifact 已并入 R4.4 三个 tab;
          『底部辅助』= R6 (footer-meta).
        </div>
      `;
    }

    function setActiveRegion(id) {
      document.querySelectorAll('.region-box').forEach(el => {
        const current = el.dataset.region === id;
        const style = regionStyles[el.dataset.region];
        el.classList.toggle('ring-4', current);
        if (style) el.classList.toggle(style.ring, current);
      });
      const panel = document.getElementById('region-inspector');
      if (!panel) return;
      panel.innerHTML = `
        <div class="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-500">图例 / IA 对照</div>
        <div class="mb-3 flex items-center gap-2">${regionChip(id)}<span class="font-semibold">${regionStyles[id].name}</span><span class="text-sm text-slate-600">（${regionDescriptions[id]}）</span></div>
        <div class="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-500">此区域承载的 IA 单元</div>
        <ul class="space-y-1 text-sm text-slate-700">
          ${regionContent[id].map(item => `<li class="border-l-2 border-slate-300 pl-2">${item}</li>`).join('')}
        </ul>
      `;
    }

    function renderDesktopWireframe() {
      const overviewRows = [
        { skill: 'eval-news-impact', cases: 5, ts: '2026-05-20 10:34', crash: 0, no: 0.62, with: 0.78, delta: '+0.16' },
        { skill: 'broken-skill', cases: 3, ts: '2026-05-19 18:00', crash: 2, no: 0.38, with: 0.41, delta: '+0.03' },
        { skill: '_target-skill', cases: 2, ts: '2026-05-18 09:12', crash: 0, no: 0.55, with: 0.55, delta: '0.00' },
        { skill: 'summarizer', cases: 4, ts: '2026-05-20 14:45', crash: 1, no: 0.49, with: 0.71, delta: '+0.22' },
        { skill: 'classifier', cases: 6, ts: '2026-05-20 16:10', crash: 0, no: 0.58, with: 0.62, delta: '+0.04' }
      ];
      const historyRuns = [
        ['2026-05-20 10:34', 'pass-rate 0.78'],
        ['2026-05-19 18:00', 'pass-rate 0.76'],
        ['2026-05-18 09:12', 'pass-rate 0.69'],
        ['2026-05-17 16:40', 'pass-rate 0.71'],
        ['2026-05-16 11:25', 'pass-rate 0.66'],
        ['2026-05-15 08:55', 'pass-rate 0.62']
      ];
      const bar = (value, tone) => `
        <div class="h-2.5 flex-1 border border-slate-300 bg-white">
          <div class="h-full ${tone}" style="width:${Math.round(value * 100)}%"></div>
        </div>
      `;
      const skillCard = (row, selected = false) => `
        <div class="relative border ${selected ? 'border-blue-600 bg-blue-50 ring-2 ring-blue-500' : 'border-slate-300 bg-white'} p-2 text-[11px] leading-5 text-slate-700">
          <div class="mb-1 grid grid-cols-[1fr_auto] gap-2">
            <div>
              <div class="text-sm font-semibold text-slate-900">${row.skill}</div>
              <div class="text-slate-500">${row.cases} cases · 最新 ${row.ts}</div>
            </div>
            <div class="text-right">
              <div class="text-xl font-semibold leading-none text-slate-950">${Math.round(row.with * 100)}%</div>
              <div class="text-slate-600">Δ ${row.delta}</div>
            </div>
          </div>
          <div class="space-y-1.5">
            <div class="grid grid-cols-[62px_1fr] items-center gap-2">
              <span class="text-slate-500">No Skill</span>
              ${bar(row.no, 'bg-slate-300')}
            </div>
            <div class="grid grid-cols-[62px_1fr] items-center gap-2">
              <span class="text-slate-800">With Skill</span>
              ${bar(row.with, 'bg-slate-800')}
            </div>
          </div>
          ${row.crash ? `<div class="absolute right-2 bottom-2 border border-rose-300 bg-white px-1.5 py-0.5 text-[10px] font-semibold text-rose-700">crash ${row.crash}</div>` : ''}
        </div>
      `;
      const overviewCards = (selected = false, suffix = '') => `
        <div class="flex flex-col gap-2 border border-slate-300 bg-white p-2">
          <div class="flex flex-wrap items-center justify-between gap-x-3 gap-y-1 text-[11px]">
            <div class="flex items-center gap-1">
              <span class="text-slate-600">排序:</span>
              <span class="border border-slate-300 bg-slate-50 px-2 py-1 font-semibold text-slate-700">|Δ| 降序 ▾</span>
            </div>
            <div class="flex items-center gap-1">
              <span class="text-slate-600">过滤:</span>
              <button type="button" data-group="crash-filter${suffix}" data-value="all" aria-selected="true" class="interactive-pill border border-slate-900 bg-slate-900 px-2 py-1 font-semibold text-white">全部</button>
              <button type="button" data-group="crash-filter${suffix}" data-value="crash" aria-selected="false" class="interactive-pill border border-slate-300 bg-white px-2 py-1 text-slate-700">只看 crash</button>
            </div>
          </div>
          ${overviewRows.map(row => skillCard(row, selected && row.skill === 'eval-news-impact')).join('')}
        </div>
      `;
      const topStrip = '数据源: /Users/.../skill-eval/runs · runs 总数 247 · crash 3 · 最近扫描 2026-05-21 10:42';

    function setPillState(button, active) {
      button.setAttribute('aria-selected', active ? 'true' : 'false');
      button.classList.toggle('border-blue-600', active);
      button.classList.toggle('bg-blue-600', active);
      button.classList.toggle('text-white', active);
      button.classList.toggle('font-semibold', active);
      button.classList.toggle('border-slate-300', !active);
      button.classList.toggle('bg-white', !active);
      button.classList.toggle('text-slate-600', !active);
      const darkGroups = ['task-subtab', 'task-subtab-mobile', 'result-doc', 'result-json'];
      if (darkGroups.includes(button.dataset.group)) {
        button.classList.toggle('border-slate-900', active);
        button.classList.toggle('bg-slate-900', active);
        button.classList.toggle('border-blue-600', false);
        button.classList.toggle('bg-blue-600', false);
      }
    }

    function initLayer2Interactions() {
      const tsItems = Array.from(document.querySelectorAll('[data-ts-index]'));
      const tsLabels = [...new Set(tsItems.map(item => item.textContent.split(' · ')[0]))];
      let tsIndex = 0;
      function setTs(index) {
        tsIndex = Math.max(0, Math.min(index, tsLabels.length - 1));
        const label = tsLabels[tsIndex] || '2026-05-20 10:34';
        document.querySelectorAll('[data-ts-current]').forEach(el => { el.textContent = label; });
        tsItems.forEach(item => {
          const active = item.textContent.split(' · ')[0] === label;
          item.classList.toggle('border-slate-900', active);
          item.classList.toggle('bg-slate-900', active);
          item.classList.toggle('text-white', active);
          item.classList.toggle('border-transparent', !active);
          item.classList.toggle('bg-white', !active);
          item.classList.toggle('text-slate-700', !active);
        });
      }
      content.onclick = event => {
        const button = event.target.closest('button');
        if (!button) return;
        if (button.dataset.group) {
          const { group, value } = button.dataset;
          content.querySelectorAll(`button[data-group="${group}"]`).forEach(item => setPillState(item, item === button));
          content.querySelectorAll(`[data-panel="${group}"]`).forEach(panel => { panel.hidden = panel.dataset.value !== value; });
        }
        if (button.dataset.tsStep) setTs(tsIndex + Number(button.dataset.tsStep));
        if (button.dataset.tsIndex) {
          const label = button.textContent.split(' · ')[0];
          setTs(tsLabels.indexOf(label));
          button.closest('details')?.removeAttribute('open');
        }
      };
      setTs(0);
    }

    function render(layerId) {
      content.innerHTML = layerId === 'l2' ? renderLayer2() : placeholders[layerId];
      tabs.forEach(tab => {
        const active = tab.dataset.layer === layerId;
        tab.className = `tab border px-3 py-1.5 text-sm font-medium ${active ? 'border-slate-900 bg-slate-900 text-white' : 'border-slate-300 bg-white text-slate-700 hover:bg-slate-100'}`;
      });
      document.querySelectorAll('.region-box').forEach(el => {
        el.addEventListener('mouseenter', () => setActiveRegion(el.dataset.region));
        el.addEventListener('click', () => setActiveRegion(el.dataset.region));
      });
      if (layerId === 'l2') initLayer2Interactions();
      history.replaceState(null, '', '#' + layerId);
    }

    tabs.forEach(tab => tab.addEventListener('click', () => render(tab.dataset.layer)));
    const initial = (location.hash || '#l2').replace('#', '');
    render(['l1', 'l2', 'l3', 'l4'].includes(initial) ? initial : 'l2');
  </script>
</body>
</html>
